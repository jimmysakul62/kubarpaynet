<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login KUBARPAYNET</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* background gambar */
background:url("bg.jpg") no-repeat center center;
background-size:cover;
}

/* kotak login */

.login-box{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:10px;
color:white;
width:300px;
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
border:none;
background:#00d4ff;
color:white;
font-weight:bold;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0099cc;
}

</style>
</head>

<body>

<div class="login-box">

<h2>KUBARPAYNET</h2>

<input id="username" name="username" autocomplete="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

</div>

<script>

let users=[

{username:"superadmin",password:"12345",role:"super",kampung:"ALL"},
{username:"admin_awai",password:"awai123",role:"admin",kampung:"AWAI"},
{username:"admin_dempar",password:"dempar123",role:"admin",kampung:"DEMPAR"},
{username:"admin_lendian",password:"lendian123",role:"admin",kampung:"LENDIAN"},
{username:"admin_muut",password:"muut123",role:"admin",kampung:"MUUT"},
{username:"admin_tondoh",password:"tondoh123",role:"admin",kampung:"TONDOH"},
{username:"admin_muara_jawaq",password:"mjawaq123",role:"admin",kampung:"MUARAJAWAQ"},
{username:"admin_marimun",password:"marimun123",role:"admin",kampung:"MARIMUN"}

];

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

let user=users.find(x=>x.username==u && x.password==p);

if(user){

localStorage.setItem("login_user",JSON.stringify(user));

window.location="index.html";

}else{

alert("Username / Password salah");

}

}

</script>

</body>
</html>
